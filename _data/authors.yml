# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              yubbit
  email:             rsformoso@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    yubbit is a software developer with a Master's degree in Information Technology from
    the University of New South Wales (UNSW). He has done work in developing fully
    offline augmented reality experiences for the Meta Quest 2 in Unity for museums,
    which were subsequently packaged with artificial intelligence solutions for real-time 
    voice recognition and automated media tagging and suggestion systems.

    He has also had experience in setting up distributed compute systems for training 
    neural networks in PyTorch, and in writing an API allowing users to run wildfire 
    simulations through an asynchronous job queue using Docker, Celery, and RabbitMQ.

    Prior to his work in the AI and VR space, he worked as a financial analyst,
    writing scripts to collect data from thousands of different companies for analysis,
    as well as interfacing with the public APIs of several global economic institutions
    to drive our macroeconomic forecasts.

    In his spare time, he likes to play videogames, watch anime and virtual youtubers,
    and cook.

